<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Case Study Presentation Viewer - Designer Portfolio</title>
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
	<style>
		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}
		body, html {
			height: 100%;
			background-color: #111111;
			font-family: 'Poppins', sans-serif;
			color: #ffffff;
			overflow: hidden;
		}
		.viewer-container {
			display: flex;
			flex-direction: column;
			height: 100%;
		}
		.header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			padding: 16px 32px;
			background-color: rgba(17, 17, 17, 0.95);
			border-bottom: 1px solid #333333;
			backdrop-filter: blur(10px);
			z-index: 10;
		}
		.header-title h1 {
			font-size: 1.1rem;
			font-weight: 600;
			letter-spacing: 0.5px;
			color: #ffffff;
		}
		.header-title p {
			font-size: 0.8rem;
			color: #888888;
			margin-top: 2px;
			font-weight: 400;
			text-transform: uppercase;
			letter-spacing: 1px;
		}
		.header-actions {
			display: flex;
			gap: 12px;
		}
		.btn {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			padding: 10px 20px;
			border-radius: 2px; /* Matching the portfolio's 2px border-radius */
			font-size: 0.8rem;
			text-transform: uppercase;
			letter-spacing: 0.8px;
			text-decoration: none;
			transition: all 0.2s ease-in-out;
			font-weight: 600;
			cursor: pointer;
		}
		.btn-secondary {
			background-color: transparent;
			color: #8c8c8c;
			border: 1px solid #515151;
		}
		.btn-secondary:hover {
			background-color: #ffffff;
			color: #000000;
			border-color: #ffffff;
		}
		.btn-primary {
			background-color: #ffffff;
			color: #000000;
			border: 1px solid #ffffff;
		}
		.btn-primary:hover {
			background-color: #e6e6e6;
			border-color: #e6e6e6;
			box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1);
		}
		.iframe-container {
			flex: 1;
			background-color: #0b0b0b;
			display: flex;
			justify-content: center;
			align-items: center;
			padding: 40px;
			overflow-y: auto;
		}
		.iframe-wrapper {
			width: 100%;
			max-width: 1280px;
			aspect-ratio: 16/9;
			box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8);
			border-radius: 4px;
			overflow: hidden;
			border: 1px solid #222222;
			background-color: #000000;
			position: relative;
		}
		iframe {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			border: none;
		}
		@media (max-width: 900px) {
			.iframe-container {
				padding: 20px;
			}
		}
		@media (max-width: 600px) {
			.header {
				padding: 16px 20px;
				flex-direction: column;
				gap: 12px;
				align-items: flex-start;
			}
			.header-actions {
				width: 100%;
			}
			.btn {
				flex: 1;
				padding: 8px 12px;
				font-size: 0.75rem;
			}
			.iframe-container {
				padding: 10px;
			}
		}
	</style>
</head>
<body>
	<div class="viewer-container">
		<header class="header">
			<div class="header-title">
				<h1 id="title-text">UX Case Study</h1>
				<p id="subtitle-text">Interactive Presentation</p>
			</div>
			<div class="header-actions">
				<button onclick="window.close();" class="btn btn-secondary">Close Viewer</button>
				<a id="slides-link" href="#" target="_blank" class="btn btn-primary">Open in Google Slides</a>
			</div>
		</header>
		<main class="iframe-container">
			<div class="iframe-wrapper">
				<iframe id="presentation-iframe" src="" allowfullscreen="true" mozallowfullscreen="true" webkitallowfullscreen="true"></iframe>
			</div>
		</main>
	</div>

	<script>
		// Parse query parameters
		const urlParams = new URLSearchParams(window.location.search);
		const presentationId = urlParams.get('id');
		const presentationTitle = urlParams.get('title') || 'UX Case Study';
		const presentationSubtitle = urlParams.get('subtitle') || 'UX Case Study';

		if (presentationId) {
			// Set Title and Link
			document.title = `${presentationTitle} - Case Study`;
			document.getElementById('title-text').textContent = presentationTitle;
			document.getElementById('subtitle-text').textContent = presentationSubtitle;
			
			// Set direct Google Slides link
			document.getElementById('slides-link').href = `https://docs.google.com/presentation/d/${presentationId}/edit?usp=sharing`;
			
			// Set Iframe Embed Src (rm=minimal removes the slide controls frame for a cleaner embed)
			const embedUrl = `https://docs.google.com/presentation/d/${presentationId}/embed?start=false&loop=false&delayms=3000`;
			document.getElementById('presentation-iframe').src = embedUrl;
		} else {
			document.getElementById('title-text').textContent = 'Error';
			document.getElementById('subtitle-text').textContent = 'No presentation ID provided';
			document.getElementById('slides-link').style.display = 'none';
		}
	</script>
</body>
</html>
